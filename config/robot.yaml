# =========================================================================
#             JUMPING WHEEL-LEGGED ROBOT — CONFIGURATION SCHEMA
#                         Developed for UCR MEDDL Lab
# =========================================================================

# ── ARDUINO UNO R3 TELEMETRY LINK ────────────────────────────────────────
# Coordinates wheel control LQR loops, encoder interrupts, and MPU6050 feed.
arduino:
  device_linux: /dev/ttyACM0
  device_win: COM1
  device_mac: /dev/tty.usbserial
  baudrate: 115200

# ── FEETECH HIGH-TORQUE HIP JOINTS BUS ──────────────────────────────────
# Manages multi-turn STS series daisy-chained hip joint bus servos.
feetech:
  device_linux: /dev/ttyACM1
  device_win: COM2
  device_mac: /dev/tty.usbserial2
  baudrate: 1000000

  # Individual joint parameters
  left:
    id: 1
    default_pos: 3902
    offset_rad: 0.0
    direction: 1
    min_rad: -1.5708
    max_rad: 1.5708
  right:
    id: 2
    default_pos: 151
    offset_rad: 0.0
    direction: -1
    min_rad: -1.5708
    max_rad: 1.5708

# ── DC DRIVE WHEELS (JGB-520 MOTORS) ────────────────────────────────────
# Governs wheel geometry and encoder configurations for speed averaging.
wheels:
  encoder_ppr: 660
  wheel_circumference_m: 0.065
  max_speed_pwm: 180
  max_turn_pwm: 80

  # Individual wheel configurations (aligned with physical drivers)
  left:
    id: 1                  # Motor 1 / Channel A
    direction: 1           # Direction multiplier (1 = normal)
  right:
    id: 2                  # Motor 2 / Channel B
    direction: -1          # Direction multiplier (-1 = mirrored mounting)

# ── BALANCE DYNAMICS (offline LQR gain design) 

physical:
  total_mass_kg:       2.5      # whole robot incl. all components
  wheel_mass_kg:       0.10     # per wheel (drive motors live in chassis -> light wheels)
  wheel_radius_m:      0.0325   # 65 mm diameter (firmware WHEEL_CIRC = 0.204 m)
  com_height_m:        0.58     # axle -> chassis/COM, FULLY-EXTENDED stance (measured)
  pitch_inertia_kgm2:  0.012    # chassis box about its own COM (small vs m·L²)

  # LQR cost weights for state [x, xdot, pitch, pitch_rate] and input u
  q_weights: [80.0, 20.0, 400.0, 25.0]
  r_weight:  0.02

  # torque (N·m) -> motor PWM (0–255). Seeded so the LQR pitch gain reproduces
  # the known-good PID kpAngle≈45 PWM/deg response. TUNE THIS ON HARDWARE.
  torque_to_pwm: 7.8
